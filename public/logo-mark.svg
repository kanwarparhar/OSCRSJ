<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="OSCRSJ — Orthopedic Surgery Case Reports &amp; Series">
  <title>OSCRSJ Seal</title>
  <defs>
    <style>
      .serif { font-family: 'DM Serif Display', 'Playfair Display', Georgia, 'Times New Roman', serif; }
      .sans  { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
    <path id="seal-top" d="M 56 200 A 144 144 0 0 1 344 200"></path>
    <path id="seal-bot" d="M 64 200 A 136 136 0 0 0 336 200"></path>
  </defs>
  <rect width="400" height="400" fill="#FAF3EA"></rect>
  <g transform="translate(200 200)">
    <circle r="178" fill="none" stroke="#664930" stroke-width="1.8"></circle>
    <circle r="170" fill="none" stroke="#664930" stroke-width="0.9"></circle>
    <circle r="114" fill="none" stroke="#997E67" stroke-width="0.9"></circle>
    <rect x="-182" y="-4" width="8" height="8" transform="rotate(45 -178 0)" fill="#664930"></rect>
    <rect x="174" y="-4" width="8" height="8" transform="rotate(45 178 0)" fill="#664930"></rect>
  </g>
  <text class="sans" fill="#3d2a18" font-size="13" letter-spacing="7.6" font-weight="600">
    <textPath href="#seal-top" startOffset="50%" text-anchor="middle">ORTHOPEDIC SURGERY</textPath>
  </text>
  <text class="sans" fill="#3d2a18" font-size="12" letter-spacing="6.5" font-weight="500">
    <textPath href="#seal-bot" startOffset="50%" text-anchor="middle">CASE REPORTS · AND · SERIES</textPath>
  </text>
  <text x="200" y="216" text-anchor="middle" fill="#3d2a18" class="serif" font-size="68" letter-spacing="-2.2">OSCRSJ</text>
  <line x1="160" y1="240" x2="240" y2="240" stroke="#997E67" stroke-width="1"></line>
  <text x="200" y="262" text-anchor="middle" fill="#3d2a18" class="sans" font-size="10.4" letter-spacing="4" font-weight="600">JOURNAL · MMXXVI</text>
</svg>
