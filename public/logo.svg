<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" width="1100" height="400" role="img" aria-label="OSCRSJ — Orthopedic Surgery Case Reports &amp; Series Journal">
  <title>OSCRSJ — Orthopedic Surgery Case Reports &amp; Series Journal</title>
  <defs>
    <style>
      .serif    { font-family: 'DM Serif Display', 'Playfair Display', Georgia, 'Times New Roman', serif; }
      .serif-it { font-family: 'DM Serif Display', 'Playfair Display', Georgia, 'Times New Roman', serif; font-style: italic; }
      .sans     { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
    <path id="c-top" d="M 120 200 A 100 100 0 0 1 320 200"></path>
    <path id="c-bot" d="M 124 200 A 96 96 0 0 0 316 200"></path>
  </defs>
  <rect width="1100" height="400" fill="#FAF3EA"></rect>

  <g transform="translate(220 200)">
    <circle r="122" fill="none" stroke="#664930" stroke-width="1.4"></circle>
    <circle r="116" fill="none" stroke="#664930" stroke-width="0.7"></circle>
    <circle r="78" fill="none" stroke="#997E67" stroke-width="0.7"></circle>
    <rect x="-124" y="-3" width="6" height="6" transform="rotate(45 -121 0)" fill="#664930"></rect>
    <rect x="118" y="-3" width="6" height="6" transform="rotate(45 121 0)" fill="#664930"></rect>
  </g>
  <text class="sans" fill="#3d2a18" font-size="9" letter-spacing="5.4" font-weight="600">
    <textPath href="#c-top" startOffset="50%" text-anchor="middle">ORTHOPEDIC SURGERY</textPath>
  </text>
  <text class="sans" fill="#3d2a18" font-size="8" letter-spacing="4.6" font-weight="500">
    <textPath href="#c-bot" startOffset="50%" text-anchor="middle">CASE REPORTS · AND · SERIES</textPath>
  </text>
  <text x="220" y="218" text-anchor="middle" fill="#3d2a18" class="serif" font-size="84" letter-spacing="-4">OS</text>
  <text x="220" y="252" text-anchor="middle" fill="#3d2a18" class="sans" font-size="8.4" letter-spacing="3.4" font-weight="600">CRSJ · MMXXVI</text>

  <line x1="380" y1="90" x2="380" y2="310" stroke="#997E67" stroke-width="1"></line>

  <g>
    <text x="420" y="142" class="sans" fill="#664930" font-size="14" letter-spacing="5.6" font-weight="600">PEER REVIEWED  ·  QUARTERLY</text>
    <text x="420" y="232" class="serif" fill="#3d2a18" font-size="112" letter-spacing="-3.8">OSCRSJ</text>
    <text x="420" y="274" class="serif-it" fill="#3d2a18" font-size="22" letter-spacing="0.4">Orthopedic Surgery Case Reports &amp; Series Journal</text>
  </g>
